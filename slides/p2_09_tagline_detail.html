<div class="header"><div><p class="kicker">17 · 广告语详解</p><h1>定位语与广告语的创作方法论</h1></div><div class="sn">17.1</div></div>
<p class="body">品牌定位语和广告语是两种完全不同的东西：定位语是内部身份证明（我是谁），广告语是外部心智沟通（用户记住什么）。</p><div class="card-row"><div class="card"><h3>品牌定位语</h3><p>"布里斯湾，一个让你慢下来的风物商店。"<br>→ 战略翻译：我是XX，为YY提供ZZ，不同于竞品，我WW。<br>→ 听众：团队、投资人。生命周期：5-10年不变。</p></div><div class="card"><h3>主广告语</h3><p>"世界越快，我越慢。"<br>→ 心智沟通：不是"我们卖好东西"，是"我们选择慢"。<br>→ 听众：消费者。可配合场景切换副文案。</p></div></div><div class="insight"><p>定位语是品牌的身份证，广告语是品牌的名片。身份证不能当名片发，名片也代替不了身份证。</p></div>
