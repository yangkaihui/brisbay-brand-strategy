<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>布里斯湾</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%}
body{background:#2a1810;color:#ede4d3;font-family:'Noto Sans SC',sans-serif;overflow-y:auto}
.page{width:100%;min-height:100%;padding:24px 32px;display:flex;flex-direction:column}
.header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #c9a87c}
.kicker{font-size:13px;letter-spacing:.3em;color:#c9a87c;margin-bottom:2px}
h1{font-family:'Noto Serif SC',serif;font-size:26px;font-weight:700}
.sn{font-family:'Noto Serif SC',serif;font-size:30px;font-weight:900;color:#c9a87c;opacity:.12;line-height:1}
.content{display:flex;gap:16px;flex-wrap:wrap}
p.body{font-size:16px;line-height:1.75;margin-bottom:6px;max-width:55ch}
.card{background:#3d2a1c;color:#2a1810;padding:10px 14px;border-radius:4px;flex:1;min-width:200px}
.card h3{font-family:'Noto Serif SC',serif;font-size:13px;color:#c9a87c;margin-bottom:4px}
.card p{font-size:14px;line-height:1.6;opacity:.85}
.card-row{display:flex;gap:10px;flex-wrap:wrap}
.insight{background:#3d2a1c;padding:10px 16px;border-radius:4px;margin-top:12px}
.insight p{font-size:16px;color:#c9a87c;font-weight:600}
.insight .sub{font-size:13px;color:#8b7355;margin-top:2px}
.fb{margin-top:auto;padding-top:8px;display:flex;justify-content:space-between}
.pn{font-size:11px;color:#c9a87c}
.value-row{display:flex;flex-direction:column;gap:8px}
.value-item{background:#3d2a1c;padding:10px 14px;border-radius:4px;border-left:3px solid #c9a87c;color:#2a1810}
.value-item h3{font-size:13px;color:#c9a87c;margin-bottom:2px}
.value-item p{font-size:14px;opacity:.85;line-height:1.5}
table{width:100%;border-collapse:collapse;font-size:14px;margin-top:8px}
th{text-align:left;padding:5px 8px;border-bottom:2px solid #c9a87c;color:#c9a87c;font-size:11px;letter-spacing:.1em}
td{padding:4px 8px;border-bottom:1px solid rgba(201,168,124,.15);font-size:13px}
.pipeline{display:flex;gap:8px;flex-wrap:wrap}
.pipe{background:#3d2a1c;padding:10px 12px;border-radius:4px;flex:1;min-width:100px;text-align:center;color:#2a1810}
.pipe .nb{font-family:'Noto Serif SC',serif;font-size:26px;color:#c9a87c;font-weight:700}
.pipe .t{font-size:14px;font-weight:600;margin:3px 0}
.pipe .d{font-size:11px;color:#8b7355;line-height:1.4}
.stat-row{display:flex;gap:10px;flex-wrap:wrap}
.stat-card{background:#3d2a1c;padding:12px 16px;border-radius:4px;text-align:center;flex:1;min-width:100px;color:#2a1810}
.stat-card .nb{font-family:'Noto Serif SC',serif;font-size:24px;font-weight:700;color:#c9a87c}
.stat-card .note{font-size:13px;color:#8b7355;margin-top:3px}
</style></head>
<body><div class="page">
<div class="header"><div><p class="kicker">23 · 渠道优先级</p><h1>全渠道布局的优先级与资源分配</h1></div><div class="sn">23.1</div></div>
<table><thead><tr><th>渠道</th><th>阶段</th><th>优先级</th><th>资源需求</th><th>目标</th></tr></thead><tbody><tr><td>斌升街实体</td><td>已跑通</td><td>P0 核心</td><td>运营团队+内容支撑</td><td>首购体验场，验证模型</td></tr><tr><td>私域微信</td><td>启动中</td><td>P0 核心</td><td>社群运营</td><td>复购管道，激活2万人</td></tr><tr><td>天府八吉寄售</td><td>已启动</td><td>P1 增长</td><td>选品+物流</td><td>品牌曝光，宽窄巷子引流</td></tr><tr><td>小红书店铺</td><td>计划中</td><td>P1 增长</td><td>电商运营</td><td>内容种草→线上转化</td></tr><tr><td>麓湖CPI二店</td><td>意向</td><td>P2 探索</td><td>选址+装修+店长</td><td>验证模型可复制性</td></tr></tbody></table><div class="insight"><p>核心逻辑：线下是信任建立场（闻过再买），私域是复购管道（微信下单），小红书是流量入口（内容种草）。鼓励"线下首购→线上复购"。</p></div>
<div class="fb"><div></div><p class="pn">57</p></div>
</div></body></html>
