<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>布里斯湾 · What We Beli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  body {
    background: #2a1810; color: #ede4d3;
    font-family: 'Noto Sans SC', sans-serif;
    overflow-y: auto; overflow-x: hidden;
  }
  .page {
    width: 100%; min-height: 100%; padding: 24px 32px;
    display: flex; flex-direction: column;
  }
  .header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 14px; padding-bottom: 8px;
    border-bottom: 1px solid #c9a87c;
  }
  .kicker { font-size: 13px; letter-spacing: 0.3em; color: #c9a87c; margin-bottom: 2px; }
  h1 {
    font-family: 'Noto Serif SC', 'STSong', serif;
    font-size: 26px; font-weight: 700;
  }
  .section-num {
    font-family: 'Noto Serif SC', serif;
    font-size: 30px; font-weight: 900; color: #c9a87c; opacity: 0.12; line-height: 1;
  }
  .content { display: flex; gap: 20px; flex: 1; }
  .text-col { flex: 1; }
  p.body {
    font-size: 16px; line-height: 1.75; margin-bottom: 6px;
  }
  .cards { display: flex; flex-wrap: wrap; gap: 8px; }
  .card {
    background: #3d2a1c; padding: 10px 14px;
    border-radius: 4px; flex: 1; min-width: 180px;
  }
  .card h3 { font-family: 'Noto Serif SC', serif; font-size: 13px; margin-bottom: 4px; color: #c9a87c; }
  .card p { font-size: 14px; line-height: 1.6; opacity: 0.85; }
  .insight {
    background: #3d2a1c; padding: 10px 16px; border-radius: 4px;
    text-align: center; margin-top: 12px;
  }
  .insight p { font-size: 16px; color: #c9a87c; font-weight: 600; }
  .footer-bar {
    margin-top: 12px; padding-top: 8px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .pn { font-size: 11px; color: #c9a87c; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 5px 8px; border-bottom: 2px solid #c9a87c; color: #c9a87c; font-size: 11px; letter-spacing: 0.1em; }
  td { padding: 4px 8px; border-bottom: 1px solid rgba(201,168,124,0.15); }
  tr:last-child td { border-bottom: 2px solid #c9a87c; color: #c9a87c; font-weight: 600; }
  .value-row { display: flex; flex-direction: column; gap: 8px; }
  .value-item {
    background: #3d2a1c; padding: 10px 14px; border-radius: 4px;
    border-left: 3px solid #c9a87c;
  }
  .value-item h3 { font-size: 13px; color: #c9a87c; margin-bottom: 2px; }
  .value-item p { font-size: 14px; opacity: 0.85; line-height: 1.5; }
  .pipeline { display: flex; gap: 8px; flex-wrap: wrap; }
  .pipe-step {
    background: #3d2a1c; padding: 10px 12px; border-radius: 4px;
    flex: 1; min-width: 100px; text-align: center;
  }
  .pipe-step .nb { font-family: 'Noto Serif SC', serif; font-size: 26px; color: #c9a87c; font-weight: 700; }
  .pipe-step .t { font-size: 14px; color: #ede4d3; font-weight: 600; margin: 3px 0; }
  .pipe-step .d { font-size: 11px; color: #8b7355; line-height: 1.4; }
  .stat-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .stat-card {
    background: #3d2a1c; padding: 14px 18px; border-radius: 4px; text-align: center; flex: 1; min-width: 120px;
  }
  .stat-card .nb { font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 700; color: #c9a87c; line-height: 1; }
  .stat-card .unit { font-size: 14px; }
  .stat-card .note { font-size: 11px; color: #8b7355; margin-top: 3px; }
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; border: 0.5px solid #c9a87c; color: #8b7355; }
  .highlight { background: #ede4d3; color: #2a1810; padding: 1px 5px; border-radius: 2px; font-weight: 500; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div><p class="kicker">12 · 品牌价值观</p><h1>What We Believe</h1></div>
    <div class="section-num">15</div>
  </div>
  <div class="value-row"><div class="value-item"><h3>审美不妥协</h3><p>不符合选品逻辑的，卖再好也不上。天府八吉卖得好的东西也没上布里斯湾。</p></div><div class="value-item"><h3>内容驱动扩张</h3><p>第二店必须有内容可能性才开。赚钱不是目的，找到有故事可讲的场域才值得冒险。</p></div><div class="value-item"><h3>诚实地慢慢来</h3><p>做得到的就说，做不到的不承诺。不是完全的环保店，但尽量往这个方向争取。</p></div></div>
  <div class="footer-bar"><div></div><p class="pn">15</p></div>
</div>
</body>
</html>
