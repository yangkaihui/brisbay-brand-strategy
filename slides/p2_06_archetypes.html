<div class="header"><div><p class="kicker">14 · 12原型</p><h1>12品牌原型轮盘：布里斯湾的定位</h1></div><div class="sn">14.1</div></div>
<p class="body">基于荣格集体无意识理论，12种品牌原型分为四大类别。布里斯湾定位：照顾者（主）× 智者（辅）。</p><div class="card-row"><div class="card"><h3>独立类</h3><p>天真者(迪士尼) · 探险家(红牛) · 智者(谷歌)</p></div><div class="card"><h3>掌控类</h3><p>英雄(耐克) · 统治者(劳力士) · 魔法师(特斯拉)</p></div><div class="card"><h3>从属类</h3><p>凡夫俗子(可口可乐) · 情人(蒂芙尼) · 小丑(麦当劳)</p></div><div class="card"><h3>稳定类</h3><p>照顾者(强生) ← 布里斯湾 · 创造者(乐高) · 叛逆者(哈雷)</p></div></div><div class="insight"><p>照顾者：温柔地照顾你的日常感受。智者：有审美的判断力。两者叠加 = 安静的品味邻居。</p></div>
