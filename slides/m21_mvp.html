<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>布里斯湾</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%}
body{background:#ede4d3;color:#2a1810;font-family:'Noto Sans SC',sans-serif;overflow-y:auto}
.page{width:100%;min-height:100%;padding:24px 32px;display:flex;flex-direction:column;position:relative;z-index:1}
.header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #c9a87c}
.kicker{font-size:13px;letter-spacing:.3em;color:#c9a87c;margin-bottom:2px}
h1{font-size:26px;font-family:'Noto Serif SC',serif;font-size:26px;font-weight:700}
.sn{font-family:'Noto Serif SC',serif;font-size:30px;font-weight:900;color:#c9a87c;opacity:.12;line-height:1}
.content{display:flex;gap:16px;flex-wrap:wrap}
p.body{font-size:16px;line-height:1.75;margin-bottom:6px;max-width:55ch}
p.body-sm{font-size:14px;line-height:1.6;margin-bottom:4px;color:#8b7355}
.card{background:#2a1810;color:#ede4d3;padding:12px 16px;border-radius:4px;flex:1;min-width:200px}
.card h3{font-family:'Noto Serif SC',serif;font-size:18px;color:#c9a87c;margin-bottom:4px}
.card p{font-size:14px;line-height:1.6;opacity:.85}
.card-row{display:flex;gap:10px;flex-wrap:wrap}
.insight{background:#2a1810;padding:12px 16px;border-radius:4px;margin-top:12px}
.insight p{font-size:16px;color:#c9a87c;font-weight:600}
.fb{margin-top:auto;padding-top:8px;display:flex;justify-content:space-between}
.pn{font-size:11px;color:#c9a87c}
table{width:100%;border-collapse:collapse;font-size:14px;margin-top:8px}
th{text-align:left;padding:5px 8px;border-bottom:2px solid #c9a87c;color:#c9a87c;font-size:13px;letter-spacing:.1em}
td{padding:4px 8px;border-bottom:1px solid rgba(201,168,124,.15);font-size:14px}
.value-row{display:flex;flex-direction:column;gap:8px}
.value-item{background:#2a1810;padding:12px 16px;border-radius:4px;border-left:3px solid #c9a87c;color:#ede4d3}
.value-item h3{font-size:18px;color:#c9a87c;margin-bottom:2px}
.value-item p{font-size:14px;opacity:.85;line-height:1.5}
.pipeline{display:flex;gap:8px;flex-wrap:wrap}
.pipe{background:#2a1810;padding:12px 14px;border-radius:4px;flex:1;min-width:100px;text-align:center;color:#ede4d3}
.pipe .nb{font-family:'Noto Serif SC',serif;font-size:22px;color:#c9a87c;font-weight:700}
.pipe .t{font-size:14px;font-weight:600;margin:3px 0}
.pipe .d{font-size:11px;color:#8b7355;line-height:1.4}
.bg-img{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;opacity:.12;z-index:0}
.inline-img{width:200px;height:auto;border-radius:4px;object-fit:cover;flex-shrink:0}
</style></head>
<body>
<div class="page">
<div class="header"><div><p class="kicker">21 · MVP聚焦</p><h1>产品矩阵的MVP阶段：先打透一个品类</h1></div><div class="sn">21.2</div></div>
<p class="body">品牌初期不做产品矩阵。MVP阶段只做引流款（线香），验证通过后再扩展利润款（古美术）和形象款（活动限定品）。矩阵演进节奏：</p><div class="pipeline"><div class="pipe"><div class="nb">0-3月</div><div class="t">引流款</div><div class="d">线香——袅袅香铺<br>验证"试香→复购"漏斗<br>目标：月复购率>25%</div></div><div class="pipe"><div class="nb">3-6月</div><div class="t">+利润款</div><div class="d">古美术上线<br>验证"线香引流→古美术利润"<br>目标：古美术月销>5件</div></div><div class="pipe"><div class="nb">6-12月</div><div class="t">+形象款</div><div class="d">活动限定品<br>验证"策展创造稀缺需求"<br>目标：限定品售罄率>80%</div></div></div><div class="insight"><p>关键约束：品牌初期不做产品矩阵。先把一个品类打透，验证模型，再扩展。","慢"不是慢在速度，是慢在"每步都踩实"。</p></div>
<div class="fb"><div></div><p class="pn">85</p></div>
</div>
</body></html>
