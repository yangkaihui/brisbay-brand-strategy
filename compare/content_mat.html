<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Mat Content</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,900;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%}
body{background:#f5f0e8;color:#2a2018;font-family:'Jost',sans-serif;overflow-y:auto}
.page{width:100%;min-height:100%;padding:28px 36px;display:flex;flex-direction:column}
.header{margin-bottom:16px;padding-bottom:10px;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid #d4c8b0}
.kicker{font-size:8px;color:#d4844a;letter-spacing:3px;margin-bottom:4px;text-transform:uppercase}
h1{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#2a2018}
.sn{font-family:'Playfair Display',serif;font-size:40px;font-weight:900;color:#d4844a;opacity:.1;line-height:1}
.content{display:flex;gap:20px;flex:1}
.text-col{flex:1.2}
p.body{font-size:11px;line-height:1.8;margin-bottom:8px;color:#3a3028}
.highlight{background:#4a5a4a;color:#f5f0e8;padding:1px 5px;border-radius:2px}
.data-col{flex:0.8;display:flex;flex-direction:column;gap:8px}
.stat{background:#4a5a4a;padding:12px 16px;border-radius:4px;display:flex;align-items:center;gap:12px;color:#f5f0e8}
.stat .nb{font-family:'Playfair Display',serif;font-size:30px;font-weight:900;color:#d4844a;min-width:40px}
.stat .unit{font-size:10px;font-weight:500}
.stat .note{font-size:8px;color:#c5b8a0;margin-top:2px}
.fb{margin-top:auto;padding-top:8px;display:flex;justify-content:space-between;align-items:center}
.tags{display:flex;gap:6px}
.tag{font-size:7px;padding:2px 8px;border-radius:10px;border:.5px solid #d4844a;color:#8a7a6a}
.pn{font-size:8px;color:#d4844a}
</style></head>
<body>
<div class="page">
<div class="header"><div><p class="kicker">01 · Project Background</p><h1>布里斯湾风物商店</h1></div><div class="sn">01</div></div>
<div class="content">
<div class="text-col">
<p class="body">布里斯湾是位于成都少城斌升街28号 <span class="highlight">028C青年创意社区</span> 内的一家内容策展型风物选物空间。2026年4月开业，以<span class="highlight">"世界越快，我越慢"</span>为品牌哲学，经营线香、清酒、古美术器物、手工皂、民艺手工等多品类风物商品。</p>
<p class="body">店内设有固定快闪区域，已落地陶艺家痞斯展、梅子季主题策展、JETRO清酒月等多场策展活动。背后是10年文创选品经验（天府八吉）+ 10人专业团队 + 028C内容引擎支撑。</p>
</div>
<div class="data-col">
<div class="stat"><span class="nb">2</span><div><span class="unit">个月</span><div class="note">开业时长，销售超预期</div></div></div>
<div class="stat"><span class="nb">2.8</span><div><span class="unit">元起</span><div class="note">线香分装最低尝鲜价</div></div></div>
<div class="stat"><span class="nb">2</span><div><span class="unit">万+</span><div class="note">社群资产（企微+小红书）</div></div></div>
</div>
</div>
<div class="fb"><div class="tags"><span class="tag">线香</span><span class="tag">清酒</span><span class="tag">古美术</span></div><span class="pn">02</span></div>
</div>
</body>
</html>
