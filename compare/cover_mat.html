<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Mat Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,900;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%}
body{background:#4a5a4a;color:#f5f0e8;font-family:'Jost',sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden}
.page{text-align:center;padding:40px;position:relative}
.wood-grain{position:absolute;inset:0;opacity:.03;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.05) 2px,rgba(255,255,255,.05) 4px)}
.accent-dot{width:8px;height:8px;background:#d4844a;border-radius:50%;margin:0 auto 24px}
.kicker{font-size:9px;letter-spacing:8px;color:#d4844a;margin-bottom:20px;text-transform:uppercase;font-weight:500}
h1{font-family:'Playfair Display',serif;font-size:clamp(36px,7vw,68px);font-weight:900;line-height:1.05;margin-bottom:16px;color:#f5f0e8}
.rule{width:80px;height:1px;background:#d4844a;margin:0 auto 20px}
.subtitle{font-size:clamp(13px,2vw,18px);color:#d4844a;letter-spacing:4px;margin-bottom:8px}
.tagline{font-size:clamp(10px,1.2vw,13px);color:#c5b8a0}
.meta{position:fixed;bottom:24px;left:0;right:0;text-align:center;font-size:8px;color:#8a9a8a;letter-spacing:2px}
</style></head>
<body>
<div class="page">
  <div class="wood-grain"></div>
  <div class="accent-dot"></div>
  <p class="kicker">Brand Strategy</p>
  <h1>布里斯湾</h1>
  <div class="rule"></div>
  <p class="subtitle">世界越快，我越慢</p>
  <p class="tagline">一个让你慢下来的风物商店</p>
</div>
<p class="meta">成都 · 少城 · 斌升街 28号 ｜ 2026.07 ｜ 布里斯湾 × 028C</p>
</body>
</html>
