<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Editorial Content</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%}
body{background:#FBFAF8;color:#1a1a1a;font-family:'Inter',sans-serif;overflow-y:auto}
.page{width:100%;min-height:100%;padding:28px 36px;display:flex;flex-direction:column}
.header{margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #e0dcd5}
.kicker{font-family:'JetBrains Mono',monospace;font-size:8px;color:#635BFF;letter-spacing:2px;margin-bottom:4px}
h1{font-family:'Source Serif 4',serif;font-size:22px;font-weight:700}
.content{display:flex;gap:20px;flex:1}
.text-col{flex:1.2}
p.body{font-size:11px;line-height:1.85;margin-bottom:8px;font-family:'Source Serif 4',serif;max-width:48ch}
.data-col{flex:0.8;display:flex;flex-direction:column;gap:8px}
.stat{display:flex;align-items:center;gap:12px;padding:10px 14px;border-left:2px solid #635BFF;background:#f5f3f0;border-radius:0 4px 4px 0}
.stat .nb{font-family:'Source Serif 4',serif;font-size:28px;font-weight:900;color:#635BFF;min-width:40px}
.stat .unit{font-size:10px;font-weight:600}
.stat .note{font-size:8px;color:#888;margin-top:2px}
.inline-data{background:#f5f3f0;padding:8px 12px;border-radius:4px;display:inline-block;margin:4px 0}
.inline-data .nb{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:500;color:#635BFF}
.fb{margin-top:auto;padding-top:8px;display:flex;justify-content:space-between}
.pn{font-family:'JetBrains Mono',monospace;font-size:9px;color:#aaa}
</style></head>
<body>
<div class="page">
<div class="header"><div><p class="kicker">01 · PROJECT BACKGROUND</p><h1>布里斯湾风物商店</h1></div></div>
<div class="content">
<div class="text-col">
<p class="body">布里斯湾是位于成都少城斌升街28号 028C青年创意社区内的一家内容策展型风物选物空间。2026年4月开业，以"世界越快，我越慢"为品牌哲学，经营线香、清酒、古美术器物、手工皂、民艺手工等多品类风物商品。</p>
<p class="body">店内设有固定快闪区域，已落地陶艺家痞斯展、梅子季主题策展、JETRO清酒月等多场策展活动。背后是10年文创选品经验（天府八吉）+ 10人专业团队 + 028C内容引擎支撑。</p>
<div class="inline-data"><span class="nb">2.8</span> <span style="font-size:9px;color:#888">元起 · 线香分装最低尝鲜价</span></div>
</div>
<div class="data-col">
<div class="stat"><span class="nb">2</span><div><span class="unit">个月</span><div class="note">开业时长，销售超预期</div></div></div>
<div class="stat"><span class="nb">2.8</span><div><span class="unit">元起</span><div class="note">线香分装最低尝鲜价</div></div></div>
<div class="stat"><span class="nb">2</span><div><span class="unit">万+</span><div class="note">社群资产（企微+小红书）</div></div></div>
</div>
</div>
<div class="fb"><div></div><span class="pn">02</span></div>
</div>
</body>
