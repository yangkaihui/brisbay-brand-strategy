<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>布里斯湾 · 封面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  body {
    background: #2a1810;
    color: #ede4d3;
    font-family: 'Noto Sans SC', sans-serif;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .page {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
  }
  .top-bar { position: fixed; top: 0; left: 0; right: 0; height: 4px; background: #c9a87c; }
  .kicker {
    font-size: clamp(7px, 1vw, 10px); letter-spacing: 0.5em; color: #c9a87c; opacity: 0.7;
    margin-bottom: 1.5em;
  }
  h1 {
    font-family: 'Noto Serif SC', 'STSong', serif;
    font-size: clamp(28px, 6vw, 56px); font-weight: 900; line-height: 1.1;
    letter-spacing: 0.08em; margin-bottom: 0.6em;
  }
  .gold-rule { width: 16em; height: 2px; background: #c9a87c; margin-bottom: 1.2em; }
  .subtitle {
    font-size: clamp(12px, 2vw, 18px); color: #c9a87c; letter-spacing: 0.4em; margin-bottom: 0.5em;
  }
  .tagline {
    font-size: clamp(10px, 1.3vw, 14px); color: #8b7355; letter-spacing: 0.1em;
  }
  .bottom-bar {
    position: fixed; bottom: 2em; left: 3em; right: 3em;
    display: flex; justify-content: space-between;
    font-size: clamp(7px, 0.8vw, 9px); color: #8b7355; letter-spacing: 0.2em;
  }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="page">
  <p class="kicker">BRAND STRATEGY</p>
  <h1>布里斯湾</h1>
  <div class="gold-rule"></div>
  <p class="subtitle">世界越快，我越慢</p>
  <p class="tagline">一个让你慢下来的风物商店</p>
</div>
<div class="bottom-bar">
  <p>成都 · 少城 · 斌升街 28号<br>2026.07 ｜ 布里斯湾 × 028C</p>
  <p>品牌全案策略方案</p>
</div>
</body>
</html>
