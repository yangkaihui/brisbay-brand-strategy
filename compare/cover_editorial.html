<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Editorial Longform Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%}
body{background:#FBFAF8;color:#1a1a1a;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden}
.page{text-align:center;padding:40px}
.top-rule{width:60px;height:2px;background:#635BFF;margin:0 auto 24px}
.kicker{font-size:9px;letter-spacing:6px;color:#635BFF;margin-bottom:20px;text-transform:uppercase;font-weight:500}
h1{font-family:'Source Serif 4',serif;font-size:clamp(32px,7vw,64px);font-weight:900;line-height:1.05;letter-spacing:-0.02em;margin-bottom:16px;color:#1a1a1a}
.subtitle{font-family:'Source Serif 4',serif;font-size:clamp(14px,2.2vw,20px);font-style:italic;color:#555;margin-bottom:8px}
.tagline{font-size:clamp(10px,1.3vw,13px);color:#888}
.meta{position:fixed;bottom:24px;left:0;right:0;text-align:center;font-size:8px;color:#aaa;letter-spacing:2px}
</style></head>
<body>
<div class="page">
  <div class="top-rule"></div>
  <p class="kicker">Brand Strategy</p>
  <h1>布里斯湾</h1>
  <p class="subtitle">世界越快，我越慢</p>
  <p class="tagline">一个让你慢下来的风物商店</p>
</div>
<p class="meta">成都 · 少城 · 斌升街 28号 ｜ 2026.07 ｜ 布里斯湾 × 028C</p>
</body>
</html>
